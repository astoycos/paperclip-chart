{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ required "auth.secret is required when auth.existingSecret is not set (generate with: openssl rand -hex 32)" .Values.auth.secret | quote }}
  {{- if .Values.adapters.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.adapters.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.adapters.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.adapters.anthropicApiKey | quote }}
  {{- end }}
{{- end }}
