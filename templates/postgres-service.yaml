{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "paperclip.postgresql.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: tcp-pg
      protocol: TCP
      name: tcp-pg
  selector:
    {{- include "paperclip.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}
